<!DOCTYPE html>
<html>
<head>
  <title>Blastter Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-900 text-white">

<!-- SIDEBAR -->
<div class="flex">

  <div class="w-64 h-screen bg-slate-800 p-5">
    <h2 class="text-2xl font-bold mb-5">Blastter</h2>
    <ul class="space-y-3">
      <li>🏠 Dashboard</li>
      <li>📱 WhatsApp</li>
      <li>💰 Saldo</li>
      <li>⚙️ Settings</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6">

    <!-- TOPBAR -->
    <div class="flex justify-between mb-6">
      <h2 class="text-xl">Dashboard</h2>
      <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="bg-slate-800 p-5 rounded w-80">
      <h3 class="mb-3">Login</h3>
      <input id="user" placeholder="username" class="w-full mb-2 p-2 rounded bg-slate-700">
      <input id="pass" type="password" placeholder="password" class="w-full mb-2 p-2 rounded bg-slate-700">
      <button onclick="login()" class="w-full bg-blue-500 p-2 rounded mb-2">Login</button>
      <button onclick="register()" class="w-full bg-green-500 p-2 rounded">Register</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

      <!-- CARDS -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-800 p-5 rounded">
          <h4>Saldo</h4>
          <h1 id="balance" class="text-2xl"></h1>
        </div>

        <div class="bg-slate-800 p-5 rounded">
          <h4>User</h4>
          <h1 id="name"></h1>
        </div>
      </div>

      <!-- MENU -->
      <div class="mt-5 grid grid-cols-2 gap-4">
        <button class="bg-slate-700 p-4 rounded">📱 Kirim WA</button>
        <button onclick="topup()" class="bg-slate-700 p-4 rounded">💰 Topup</button>
      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
