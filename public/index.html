<!DOCTYPE html>
<html>
<head>
<title>Blastter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Blastter</h2>
  <p>Dashboard</p>
  <p>WhatsApp</p>
  <p>Saldo</p>
</div>

<div class="main">

  <div class="topbar">
    <h3 id="name"></h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="loginBox">
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>

  <div id="dashboard" style="display:none;">

    <div class="cards">
      <div class="card">
        <h4>Saldo</h4>
        <h1 id="balance"></h1>
      </div>
      <div class="card">
        <h4>Pesan</h4>
        <h1>120</h1>
      </div>
    </div>

    <div class="card big">
      <h3>Menu Utama</h3>
      <button>📱 Kirim WA</button>
      <button>💰 Topup</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
