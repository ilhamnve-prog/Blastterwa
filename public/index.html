<!DOCTYPE html>
<html>
<head>
<title>Blastter Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h2>Blastter</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <div class="card">
      <h3 id="name"></h3>
      <h1 id="balance"></h1>
    </div>

    <div class="grid">
      <div class="box">📱 WhatsApp</div>
      <div class="box">👥 Referral</div>
      <div class="box">💰 Withdraw</div>
      <div class="box">📊 Statistik</div>
    </div>

    <button onclick="topup()">+ Tambah Saldo</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
